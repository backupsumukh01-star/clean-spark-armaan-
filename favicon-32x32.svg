<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Crescent moon base -->
  <circle cx="16" cy="16" r="12" fill="url(#moonGrad)"/>
  <circle cx="22" cy="12" r="10" fill="#0f172a"/>
  <!-- Velocity streak / orbit -->
  <path d="M8 16 Q16 8 24 16 Q16 24 8 16" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Crypto dot accent -->
  <circle cx="20" cy="14" r="1.5" fill="#fbbf24"/>
</svg>
